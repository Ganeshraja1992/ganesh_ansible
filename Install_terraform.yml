---
- name: Install terraform on Linux host
  hosts: linux  
  gather_facts: no
  tasks:
    - name: Download terraform package
      ansible.builtin.get_url:
        url: https://releases.hashicorp.com/terraform/1.6.4/terraform_1.6.4_linux_amd64.zip
        dest: /tmp/terraform.zip

    - name: Unzip terraform package
      ansible.builtin.unarchive:
        src: /tmp/terraform.zip
        dest: /usr/local/bin/
        remote_src: yes

    - name: Verify terraform installation
      ansible.builtin.command:
        cmd: terraform version
      register: terraform_version_output
      ignore_errors: yes

    - name: Show terraform version
      ansible.builtin.debug:
        var: terraform_version_output.stdout