---
- name: Test Linux connectivity
  hosts: linux
  gather_facts: no

  tasks:
    - name: Ping Linux host
      ansible.builtin.ping:

    - name: Get hostname
      ansible.builtin.command:
        cmd: hostname
      register: hostname_output

    - name: Show hostname
      ansible.builtin.debug:
        var: hostname_output.stdout

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      become: yes

    - name: install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
      become: yes
    
    - name: Start nginx service
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes
      become: yes