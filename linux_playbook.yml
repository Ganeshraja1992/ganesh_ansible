---
- name: Test Linux connectivity
  hosts: linux
  gather_facts: no

  tasks:
    - name: Ping Linux host
      ansible.builtin.ping:

    - name: Get hostname
      ansible.builtin.command:
        cmd: hostname
      register: hostname_output

    - name: Show hostname
      ansible.builtin.debug:
        var: hostname_output.stdout

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      become: yes

    - name: install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
      become: yes
    
    - name: Start nginx service
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes
      become: yes
    
    - name: Check nginx status
      ansible.builtin.systemd:
        name: nginx
        state: started
      become: yes
      
    - name: Get nginx version
      ansible.builtin.command:
        cmd: nginx -v
      register: nginx_version_output
      ignore_errors: yes

    - name: Show nginx version
      ansible.builtin.debug:
        var: nginx_version_output.stderr

    - name: Create index.html
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: "<html><body><h1>Welcome to Ansible Managed Nginx Server</h1></body></html>"
        owner: www-data
        group: www-data
        mode: '0644'
      become: yes